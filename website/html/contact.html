<!doctype html>
<html lang="en-US">
    <head> 
        <meta charset="utf-8" />
        <meta name="viewport" content = "width=device-width" />
        <title>Contact - Medical Appointment Manager</title>
        <link href="../styles/style.css" rel="stylesheet" />
    </head>
    <body>
        <div class="wrapper">
            <div class="header-and-nav-grid">
                <header>Medical Appointment Manager</header>
                
                <nav class="primary-navigation" aria-label="Primary Navigation">
                    <ul>
                        <li><a href="../index.html">Home</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="manage.html">Manage</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </nav>
            </div>
            
            <div class="main-content-grid">
                <main>
                    <h1>Contact</h1>
                    <br>
                    <form method="post">
                        <div class="aligned-form-short">
                            <div class="form-row-height">
                                <label for="your-name">Name</label>
                            </div>
                            <div class="form-row-height">
                                <input type="text" id="your-name" name="your-name">
                            </div>
                            <div class="form-row-height">
                                <label for="your-email">Email Address</label>
                            </div>
                            <div class="form-row-height">
                                <input type="email" id="your-email" name="your-email">
                            </div>
                        </div>
                        <div class="form-row-height-large-input">
                            <label for="contact-message">Message</label>
                        </div>
                        <div class="large-input">
                            <textarea id="contact-message" name="contact-message" rows="5" cols="70" wrap="hard"></textarea>
                        </div>
                        <div>
                            <p class="button">
                                <button type="submit" class="large-button">Send Message</button>
                            </p>
                        </div>
                    </form>
                </main>
            </div>

            <div class="footer-grid">
                <footer>©2026 Heather Konecny. All rights reserved.</footer>
            </div>
        </div>
    </body>
</html>
